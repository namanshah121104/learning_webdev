<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css" />
    <script src="app.js"></script>
  </head>
  <body>
    <header>
      <nav>
        <h1>TIC TAC TOE</h1>
        <div>
          <span>Naman Shah</span>
          <ul>
            <li>
              <a href="https://github.com/namanshah121104" target="_blank"
                ><img
                  id="git"
                  src="https://img.icons8.com/?size=100&id=g7P0iny5Rros&format=png&color=000000"
              /></a>
            </li>
            <li>
              <a href="https://instagram.com/namanshah1211" target="_blank"
                ><img
                  id="insta"
                  src="https://img.icons8.com/?size=100&id=Xy10Jcu1L2Su&format=png&color=000000"
              /></a>
            </li>
          </ul>
        </div>
      </nav>
    </header>
    <main>
      <div class="container">
        <div class="gameContainer">
         <div class="box bt bl"><span class="game"></span></div>
         <div class="box bt"><span class="game"></span></div>
         <div class="box bt br"><span class="game"></span></div>
         <div class="box bl"><span class="game"></span></div>
         <div class="box"><span class="game"></span></div>
         <div class="box br"><span class="game"></span></div>
         <div class="box bb bl"><span class="game"></span></div>
         <div class="box bb"><span class="game"></span></div>
         <div class="box bb br"><span class="game"></span></div>
        </div>
        <div class="Details">
          <h3>Lets Play TIC TAC TOE</h3>
          <div class="info">your turn</div>
          <button id="reset">RESET</button>
        </div>
      </div>
    </main>
  </body>
</html>
